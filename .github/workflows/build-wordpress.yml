name: Build and Push WordPress Image

on:
  push:
    branches: [ main ]
    paths:
      - 'wordpress/**' # Only triggers if files inside the wordpress folder change!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
                                                                                                                
      - name: Build and push WordPress image
        uses: docker/build-push-action@v6
        with:
          context: ./wordpress # 👈 Tells Docker to look inside the wordpress folder
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/wordpress:latest
