name: Build and Push GitOps Utility Image

on:
  push:
    branches:
      - main
    paths:
      - 'gitops-tool/**' # Triggers only if you modify this folder

  jobs:
    build:
      runs-on: ubuntu-latest
        steps:
          - name: Checkout Code
            uses: actions/checkout@v4

          - name: Log in to Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}

          - name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v3
                                  
          - name: Build and push GitOps image
            uses: docker/build-push-action@v6
            with:
              context: ./gitops-tool
              push: true
              tags: ${{ secrets.DOCKER_USERNAME }}/gitops-utility:latest
